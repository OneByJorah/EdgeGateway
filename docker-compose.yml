version: "3.9"

services:
  edgegateway-dashboard:
    build: .
    container_name: edgegateway-dashboard
    ports:
      - "${DASHBOARD_PORT:-5000}:5000"
    environment:
      - DASHBOARD_PORT=5000
      - AP_SUBNET=${AP_SUBNET:-192.168.50.0/24}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - edgegateway-net

networks:
  edgegateway-net:
    driver: bridge

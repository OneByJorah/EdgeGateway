<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Gateway Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e2e8f0; --muted: #8892a4; --accent: #6366f1;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --cyan: #06b6d4;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; }
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 1.25rem; font-weight: 600; }
  .header .uptime { color: var(--muted); font-size: 0.875rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.5rem; }
  .card .value { font-size: 1.75rem; font-weight: 700; }
  .card .value.small { font-size: 1.1rem; }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.yellow { background: var(--yellow); }
  section { margin-bottom: 1.5rem; }
  section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; }
  .btn { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 0.875rem 1rem; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.15s; display: flex; align-items: center; gap: 0.5rem; }
  .btn:hover { border-color: var(--accent); background: #1e2030; }
  .btn:active { transform: scale(0.98); }
  .btn.danger:hover { border-color: var(--red); }
  .leases-table { width: 100%; border-collapse: collapse; }
  .leases-table th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.75rem; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  .leases-table td { padding: 0.5rem 0.75rem; font-size: 0.875rem; border-bottom: 1px solid var(--border); font-family: 'SF Mono', 'Fira Code', monospace; }
  .leases-table tr:last-child td { border-bottom: none; }
  .empty { color: var(--muted); font-style: italic; padding: 1rem; text-align: center; }
  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.875rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  #toast.show { opacity: 1; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
  .progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .progress-bar .fill.cpu { background: var(--accent); }
  .progress-bar .fill.mem { background: var(--cyan); }
  .progress-bar .fill.temp { background: var(--yellow); }
</style>
</head>
<body>

<div class="header">
  <h1>🛡 Pi Gateway</h1>
  <span class="uptime" id="uptime">Loading...</span>
</div>

<div class="container">
  <!-- Stats Cards -->
  <div class="grid">
    <div class="card">
      <div class="label">WARP Status</div>
      <div class="value small" id="warp-status"><span class="status-dot yellow"></span>—</div>
    </div>
    <div class="card">
      <div class="label">Exit IP</div>
      <div class="value small" id="warp-ip">—</div>
    </div>
    <div class="card">
      <div class="label">CPU</div>
      <div class="value" id="cpu">—<small style="font-size:.5em;color:var(--muted)">%</small></div>
      <div class="progress-bar"><div class="fill cpu" id="cpu-bar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="label">Memory</div>
      <div class="value" id="mem">—<small style="font-size:.5em;color:var(--muted)">%</small></div>
      <div class="progress-bar"><div class="fill mem" id="mem-bar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="label">Temperature</div>
      <div class="value" id="temp">—<small style="font-size:.5em;color:var(--muted)">°C</small></div>
      <div class="progress-bar"><div class="fill temp" id="temp-bar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="label">Clients</div>
      <div class="value" id="clients">—</div>
    </div>
    <div class="card">
      <div class="label">↓ RX / ↑ TX</div>
      <div class="value small" id="throughput">— / —</div>
    </div>
    <div class="card">
      <div class="label">Today RX / TX</div>
      <div class="value small" id="today-traf">— / —</div>
    </div>
  </div>

  <!-- Controls -->
  <section>
    <h2>Controls</h2>
    <div class="btn-grid">
      <button class="btn" onclick="api('/api/warp/toggle','POST')">🔄 Toggle WARP</button>
      <button class="btn" onclick="api('/api/warp/reconnect','POST')">🔁 WARP Reconnect</button>
      <button class="btn" onclick="api('/api/restart/hostapd','POST')">↩ Restart hostapd</button>
      <button class="btn" onclick="api('/api/restart/dnsmasq','POST')">↩ Restart dnsmasq</button>
      <button class="btn danger" id="btn-reboot">🔃 Reboot Pi</button>
    </div>
  </section>

  <!-- Connected Clients -->
  <section>
    <h2>Connected Clients</h2>
    <div class="card">
      <table class="leases-table">
        <thead><tr><th>IP Address</th><th>MAC Address</th><th>Hostname</th></tr></thead>
        <tbody id="leases-body"><tr><td colspan="3" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </section>
</div>

<div id="toast"></div>

<script>
const socket = io();

socket.on('stats', s => updateStats(s));
socket.on('connect', () => {
  fetchStats();
  fetchLeases();
});

async function fetchStats() {
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    updateStats(s);
  } catch(e) { console.error('Stats fetch:', e); }
}

async function fetchLeases() {
  try {
    const r = await fetch('/api/clients');
    const leases = await r.json();
    renderLeases(leases);
  } catch(e) { console.error('Leases fetch:', e); }
}

function updateStats(s) {
  const dot = document.querySelector('#warp-status .status-dot');
  if (s.warp === 'Connected') {
    document.getElementById('warp-status').innerHTML = '<span class="status-dot green"></span>Connected';
  } else {
    document.getElementById('warp-status').innerHTML = '<span class="status-dot red"></span>Disconnected';
  }
  document.getElementById('warp-ip').textContent = s.warp_ip || '—';
  document.getElementById('cpu').innerHTML = (s.cpu ?? '—') + '<small style="font-size:.5em;color:var(--muted)">%</small>';
  document.getElementById('cpu-bar').style.width = Math.min(s.cpu || 0, 100) + '%';
  document.getElementById('mem').innerHTML = (s.mem_pct ?? '—') + '<small style="font-size:.5em;color:var(--muted)">%</small>';
  document.getElementById('mem-bar').style.width = Math.min(s.mem_pct || 0, 100) + '%';
  document.getElementById('temp').innerHTML = (s.temp ?? '—') + '<small style="font-size:.5em;color:var(--muted)">°C</small>';
  document.getElementById('temp-bar').style.width = Math.min((s.temp || 0) / 80 * 100, 100) + '%';
  document.getElementById('clients').textContent = s.clients ?? '—';
  document.getElementById('throughput').textContent = `${s.rx_kbps ?? '—'} ↓ / ${s.tx_kbps ?? '—'} ↑ KB/s`;
  document.getElementById('today-traf').textContent = `${s.rx_today ?? '—'} / ${s.tx_today ?? '—'}`;
  document.getElementById('uptime').textContent = s.uptime ? 'Up ' + s.uptime : '—';
}

function renderLeases(leases) {
  const tbody = document.getElementById('leases-body');
  if (!leases || leases.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">No clients connected</td></tr>';
    return;
  }
  tbody.innerHTML = leases.map(l =>
    `<tr><td>${l.ip}</td><td>${l.mac}</td><td>${l.name || '*'}</td></tr>`
  ).join('');
}

async function api(endpoint, method='POST') {
  try {
    const r = await fetch(endpoint, { method });
    const data = await r.json();
    toast(data.action || data.error || 'OK');
    if (endpoint.includes('restart') || endpoint.includes('reboot')) {
      setTimeout(() => { fetchStats(); fetchLeases(); }, 2000);
    }
  } catch(e) { toast('Error: ' + e.message); }
}

// Reboot button
document.querySelector('.btn.danger').onclick = function() {
  if (confirm('Reboot the Pi? This will disconnect you.')) {
    fetch('/api/reboot', { method: 'POST' });
    toast('Reboot requested — disconnecting...');
  }
};

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// Refresh leases every 15s
setInterval(fetchLeases, 15000);
</script>
</body>
</html>
